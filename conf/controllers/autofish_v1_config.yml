# Autofish V1 Strategy Configuration
# 自动电鱼策略 V1 配置文件

id: autofish_v1_config
controller_name: autofish_v1
controller_type: generic

# 交易所配置 - 使用 Binance 合约测试网
connector_name: binance_perpetual_testnet
trading_pair: BTC-USDT
leverage: 10

# 资金配置
total_amount_quote: 5000

# 网格参数
grid_spacing: 0.005
max_entries: 4

# 风控参数
stop_loss: 0.08
exit_profit: 0.005

# 权重计算参数
decay_factor: 0.5

# 振幅概率分布
amplitude_probabilities:
  1: 0.36
  2: 0.24
  3: 0.16
  4: 0.09

# 订单类型配置 (1=MARKET, 2=LIMIT, 3=LIMIT_MAKER, 4=AMM_SWAP)
triple_barrier_config:
  take_profit: 0.005
  stop_loss: 0.08
  open_order_type: 3
  take_profit_order_type: 3
  stop_loss_order_type: 1
