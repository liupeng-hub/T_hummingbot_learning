<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行情可视化分析系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .header-actions { display: flex; gap: 12px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: white; color: #667eea; }
        .btn-primary:hover { background: #f0f0f0; }
        .btn-secondary { background: rgba(255,255,255,0.2); color: white; }
        .btn-secondary:hover { background: rgba(255,255,255,0.3); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .main-container { display: flex; height: calc(100vh - 68px); min-width: 1200px; }
        
        .sidebar { width: 280px; min-width: 260px; max-width: 320px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        .filter-group { margin-bottom: 10px; }
        .filter-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .filter-group select, .filter-group input { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        
        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
        .test-item { padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; }
        .test-item:hover { background: #f8f9fa; }
        .test-item.selected { border-color: #667eea; background: #f0f4ff; }
        .test-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .test-item-name { font-weight: 500; color: #333; font-size: 13px; }
        .test-item-status { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-running { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-failed { background: #fee2e2; color: #991b1b; }
        .test-item-info { font-size: 11px; color: #666; display: flex; gap: 8px; flex-wrap: wrap; }
        .test-item-params { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
        .param-tag { font-size: 10px; padding: 1px 5px; background: #e0e7ff; color: #3730a3; border-radius: 3px; }
        
        .sidebar-footer { padding: 10px 12px; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; }
        .sidebar-footer .btn { flex: 1; padding: 8px 12px; font-size: 13px; }
        
        .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .chart-section { flex: 1; padding: 12px; display: flex; flex-direction: column; overflow: hidden; }
        
        .chart-layout { display: flex; flex: 1; gap: 12px; overflow: hidden; }
        
        .chart-sidebar { width: 140px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
        
        .stats-sidebar { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stats-sidebar h3 { font-size: 12px; color: #666; margin-bottom: 12px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .stat-item:last-child { border-bottom: none; }
        .stat-label { font-size: 12px; color: #666; }
        .stat-value { font-size: 14px; font-weight: 600; }
        .stat-value.total { color: #333; }
        .stat-value.ranging { color: #f59e0b; }
        .stat-value.up { color: #ef4444; }
        .stat-value.down { color: #22c55e; }
        
        .render-mode-panel { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .render-mode-panel h3 { font-size: 12px; color: #666; margin-bottom: 8px; }
        .render-mode-panel select { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
        
        .legend-panel { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .legend-panel h3 { font-size: 12px; color: #666; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; margin-bottom: 4px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-color { width: 16px; height: 16px; border-radius: 3px; }
        .legend-ranging { background: rgba(245, 158, 11, 0.5); }
        .legend-up { background: rgba(239, 68, 68, 0.5); }
        .legend-down { background: rgba(34, 197, 94, 0.5); }
        
        .chart-main { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .chart-header { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .chart-title { font-size: 15px; font-weight: 600; color: #333; }
        .chart-info { font-size: 13px; color: #666; }
        #chart { flex: 1; width: 100%; min-height: 300px; }
        
        .table-section { background: white; border-top: 1px solid #e0e0e0; flex-shrink: 0; max-height: 200px; display: flex; flex-direction: column; }
        .table-header { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; cursor: pointer; }
        .table-header h2 { font-size: 14px; color: #333; display: flex; align-items: center; gap: 8px; }
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; position: sticky; top: 0; }
        tr:hover { background: #f8f9fa; }
        .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .badge-ranging { background: #dcfce7; color: #166534; }
        .badge-up { background: #fee2e2; color: #991b1b; }
        .badge-down { background: #dbeafe; color: #1e40af; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; border-radius: 12px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .param-group { background: #f8f9fa; padding: 12px; border-radius: 6px; margin-bottom: 12px; }
        .param-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .param-item:last-child { margin-bottom: 0; }
        .param-item label { min-width: 120px; font-size: 13px; color: #666; }
        .param-item input { flex: 1; padding: 6px 10px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 12px; }
        
        .compare-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .compare-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        .compare-item { width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 12px; background: white; }
        .compare-item-header { background: #f5f5f5; padding: 10px 16px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .compare-item-title { font-weight: 600; color: #333; font-size: 14px; }
        .compare-item-stats { display: flex; gap: 16px; font-size: 12px; color: #666; }
        .compare-item-chart { height: 300px; width: 100%; }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }
        
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; }
        .checkbox-wrapper input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        
        .compare-mode-tabs { display: flex; gap: 8px; padding: 12px; background: white; border-bottom: 1px solid #e0e0e0; }
        .compare-mode-tab { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; background: #f0f0f0; color: #666; }
        .compare-mode-tab.active { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>📊 行情可视化分析系统</h1>
            <div class="header-actions">
                <button class="btn btn-primary" @click="showNewTestModal = true">新建测试</button>
                <button class="btn btn-secondary" @click="toggleCompareMode">
                    {{ compareMode ? '退出对比' : '对比模式' }}
                </button>
                <button class="btn btn-secondary" @click="loadTestCases">刷新</button>
            </div>
        </header>
        
        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="filter-group">
                        <label>交易对</label>
                        <select v-model="filters.symbol" @change="loadTestCases">
                            <option value="">全部</option>
                            <option v-for="s in symbols" :key="s" :value="s">{{ s }}</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>算法</label>
                        <select v-model="filters.algorithm" @change="loadTestCases">
                            <option value="">全部</option>
                            <option v-for="(info, name) in algorithms" :key="name" :value="name">{{ info.name }}</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>状态</label>
                        <select v-model="filters.status" @change="loadTestCases">
                            <option value="">全部</option>
                            <option value="pending">等待中</option>
                            <option value="running">执行中</option>
                            <option value="completed">已完成</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                </div>
                
                <div class="sidebar-content">
                    <div v-if="compareMode" style="padding: 8px; background: #f0f4ff; border-radius: 6px; margin-bottom: 8px; font-size: 12px; color: #666;">
                        已选择: {{ selectedCases.length }}/4 个测试
                    </div>
                    
                    <div v-for="tc in testCases" :key="tc.id" 
                         class="test-item"
                         :class="{ selected: compareMode ? selectedCases.includes(tc.id) : selectedCase?.id === tc.id }"
                         @click="onTestCaseClick(tc)">
                        
                        <div v-if="compareMode" class="checkbox-wrapper" style="margin-bottom: 6px;">
                            <input type="checkbox" :checked="selectedCases.includes(tc.id)" @click.stop>
                            <span class="test-item-name">{{ tc.name }}</span>
                        </div>
                        
                        <div class="test-item-header">
                            <span v-if="!compareMode" class="test-item-name">{{ tc.name }}</span>
                            <span class="test-item-status" :class="'status-' + tc.status">{{ getStatusText(tc.status) }}</span>
                        </div>
                        <div class="test-item-info">
                            <span>{{ tc.symbol }}</span>
                            <span>{{ tc.algorithm }}</span>
                            <span>{{ tc.start_date }} ~ {{ tc.end_date }}</span>
                        </div>
                        <div v-if="tc.algorithm_config && Object.keys(tc.algorithm_config).length > 0" class="test-item-params">
                            <span v-for="(value, key) in tc.algorithm_config" :key="key" class="param-tag">
                                {{ key }}: {{ value }}
                            </span>
                        </div>
                    </div>
                    
                    <div v-if="testCases.length === 0" style="padding: 40px; text-align: center; color: #999;">
                        暂无测试用例
                    </div>
                </div>
                
                <div class="sidebar-footer">
                    <template v-if="compareMode">
                        <button class="btn btn-secondary" @click="cancelCompare">取消</button>
                        <button class="btn btn-primary" @click="startCompare" :disabled="selectedCases.length < 2">对比</button>
                    </template>
                    <template v-else>
                        <button class="btn btn-danger" @click="deleteSelected" :disabled="!selectedCase">删除</button>
                        <button class="btn btn-secondary" @click="reRunTest" :disabled="!selectedCase">重跑</button>
                    </template>
                </div>
            </aside>
            
            <main class="content-area">
                <template v-if="compareResults.length > 0">
                    <div class="compare-mode-tabs">
                        <button class="compare-mode-tab" :class="{ active: compareViewMode === 'separate' }" @click="compareViewMode = 'separate'">
                            分屏对比
                        </button>
                        <button class="compare-mode-tab" :class="{ active: compareViewMode === 'merged' }" @click="compareViewMode = 'merged'">
                            合并对比
                        </button>
                    </div>
                    
                    <div class="compare-section">
                        <template v-if="compareViewMode === 'separate'">
                            <div class="compare-scroll">
                                <div v-for="(result, index) in compareResults" :key="result.test_case.id" class="compare-item">
                                    <div class="compare-item-header">
                                        <span class="compare-item-title">
                                            测试 #{{ index + 1 }}: {{ result.test_case.symbol }} {{ result.test_case.algorithm }}
                                        </span>
                                        <div class="compare-item-stats">
                                            <span>震荡: {{ result.statistics?.ranging_days || 0 }}天</span>
                                            <span>上涨: {{ result.statistics?.trending_up_days || 0 }}天</span>
                                            <span>下跌: {{ result.statistics?.trending_down_days || 0 }}天</span>
                                        </div>
                                    </div>
                                    <div :id="'compare-chart-' + index" class="compare-item-chart"></div>
                                </div>
                            </div>
                        </template>
                        
                        <template v-else>
                            <div class="compare-scroll">
                                <div id="merged-chart" style="height: 500px; width: 100%; background: white; border-radius: 8px;"></div>
                            </div>
                        </template>
                    </div>
                </template>
                
                <template v-else-if="selectedCase && selectedCase.status === 'completed'">
                    <div class="chart-section">
                        <div class="chart-layout">
                            <div class="chart-sidebar">
                                <div class="stats-sidebar">
                                    <h3>统计信息</h3>
                                    <div class="stat-item">
                                        <span class="stat-label">总天数</span>
                                        <span class="stat-value total">{{ statistics.total_days || 0 }}</span>
                                    </div>
                                    <div class="stat-item">
                                        <span class="stat-label">震荡</span>
                                        <span class="stat-value ranging">{{ statistics.ranging_days || 0 }} ({{ statistics.ranging_percent || 0 }}%)</span>
                                    </div>
                                    <div class="stat-item">
                                        <span class="stat-label">上涨</span>
                                        <span class="stat-value up">{{ statistics.trending_up_days || 0 }} ({{ statistics.trending_up_percent || 0 }}%)</span>
                                    </div>
                                    <div class="stat-item">
                                        <span class="stat-label">下跌</span>
                                        <span class="stat-value down">{{ statistics.trending_down_days || 0 }} ({{ statistics.trending_down_percent || 0 }}%)</span>
                                    </div>
                                </div>
                                
                                <div class="render-mode-panel">
                                    <h3>渲染方式</h3>
                                    <select v-model="renderMode">
                                        <option value="top">顶部色带</option>
                                        <option value="overlay">K线上方色带</option>
                                    </select>
                                </div>
                                
                                <div class="legend-panel">
                                    <h3>图例</h3>
                                    <div class="legend-item"><div class="legend-color legend-ranging"></div><span>震荡</span></div>
                                    <div class="legend-item"><div class="legend-color legend-up"></div><span>上涨</span></div>
                                    <div class="legend-item"><div class="legend-color legend-down"></div><span>下跌</span></div>
                                </div>
                            </div>
                            
                            <div class="chart-main">
                                <div class="chart-header">
                                    <span class="chart-title">{{ selectedCase.name }}</span>
                                    <span class="chart-info">{{ selectedCase.symbol }} | {{ selectedCase.start_date }} ~ {{ selectedCase.end_date }} | {{ algorithms[selectedCase.algorithm]?.name }}</span>
                                </div>
                                <div id="chart"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="table-section">
                        <div class="table-header" @click="showTable = !showTable">
                            <h2>
                                <span>{{ showTable ? '▼' : '▶' }}</span>
                                <span>区间行情状态</span>
                                <span style="font-size: 11px; color: #999; font-weight: normal;">({{ statusRanges.length }} 条)</span>
                            </h2>
                        </div>
                        <div v-show="showTable" class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>序号</th>
                                        <th>开始日期</th>
                                        <th>结束日期</th>
                                        <th>状态</th>
                                        <th>持续天数</th>
                                        <th>起始价</th>
                                        <th>结束价</th>
                                        <th>涨跌幅</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(range, index) in statusRanges" :key="index">
                                        <td>{{ index + 1 }}</td>
                                        <td>{{ range.start_date }}</td>
                                        <td>{{ range.end_date }}</td>
                                        <td>
                                            <span class="status-badge" :class="'badge-' + getStatusClass(range.status)">
                                                {{ getStatusText(range.status) }}
                                            </span>
                                        </td>
                                        <td>{{ range.duration }}</td>
                                        <td>{{ range.start_price?.toFixed(2) }}</td>
                                        <td>{{ range.end_price?.toFixed(2) }}</td>
                                        <td :style="{ color: range.price_change >= 0 ? '#ef4444' : '#22c55e' }">
                                            {{ range.price_change >= 0 ? '+' : '' }}{{ range.price_change?.toFixed(2) }}%
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>
                
                <template v-else-if="selectedCase && selectedCase.status === 'running'">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        <p>测试执行中，请稍候...</p>
                    </div>
                </template>
                
                <template v-else>
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        <p>请选择一个测试用例查看结果</p>
                    </div>
                </template>
            </main>
        </div>
        
        <div v-if="showNewTestModal" class="modal-overlay" @click.self="showNewTestModal = false">
            <div class="modal">
                <div class="modal-header">
                    <h2>新建行情测试</h2>
                    <button class="modal-close" @click="showNewTestModal = false">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>测试名称</label>
                        <input v-model="newTest.name" placeholder="请输入测试名称">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>交易对</label>
                            <select v-model="newTest.symbol">
                                <option v-for="s in symbols" :key="s" :value="s">{{ s }}</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>K线周期</label>
                            <select v-model="newTest.interval">
                                <option value="1d">1天</option>
                                <option value="4h">4小时</option>
                                <option value="1h">1小时</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>开始日期</label>
                            <input type="date" v-model="newTest.start_date">
                        </div>
                        <div class="form-group">
                            <label>结束日期</label>
                            <input type="date" v-model="newTest.end_date">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>算法选择</label>
                        <select v-model="newTest.algorithm" @change="onAlgorithmChange">
                            <option v-for="(info, name) in algorithms" :key="name" :value="name">{{ info.name }}</option>
                        </select>
                    </div>
                    
                    <div v-if="currentAlgorithmParams" class="param-group">
                        <label style="font-size: 14px; font-weight: 500; margin-bottom: 8px; display: block;">算法参数</label>
                        <div v-for="(param, key) in currentAlgorithmParams" :key="key" class="param-item">
                            <label>{{ param.description }}</label>
                            <input :type="param.type === 'int' ? 'number' : 'number'" 
                                   :step="param.type === 'int' ? 1 : 0.01"
                                   v-model.number="newTest.algorithm_config[key]"
                                   :placeholder="'默认: ' + param.default">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>描述</label>
                        <textarea v-model="newTest.description" placeholder="可选的描述信息"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>文件生成选项</label>
                        <div style="display: flex; gap: 16px; margin-top: 8px;">
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="checkbox" v-model="newTest.generate_md">
                                <span>生成MD报告</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="checkbox" v-model="newTest.generate_png">
                                <span>生成PNG图表</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                                <input type="checkbox" v-model="newTest.generate_html">
                                <span>生成HTML可视化</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="showNewTestModal = false">取消</button>
                    <button class="btn btn-primary" @click="createTest" :disabled="!canCreateTest">执行测试</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref, reactive, computed, watch, onMounted, nextTick } = Vue;
        
        createApp({
            setup() {
                const testCases = ref([]);
                const selectedCase = ref(null);
                const selectedCases = ref([]);
                const compareMode = ref(false);
                const compareViewMode = ref('separate');
                const compareResults = ref([]);
                const showNewTestModal = ref(false);
                const showTable = ref(true);
                const symbols = ref(['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT', 'DOGEUSDT']);
                const algorithms = ref({});
                const filters = reactive({ symbol: '', algorithm: '', status: '' });
                const statistics = ref({});
                const statusRanges = ref([]);
                const dailyStatuses = ref([]);
                const renderMode = ref('top');
                let chart = null;
                let charts = [];
                let mergedChart = null;
                
                const newTest = reactive({
                    name: '',
                    symbol: 'BTCUSDT',
                    interval: '1d',
                    start_date: '',
                    end_date: '',
                    algorithm: 'dual_thrust',
                    algorithm_config: {},
                    description: '',
                    generate_md: false,
                    generate_png: false,
                    generate_html: false,
                });
                
                const currentAlgorithmParams = computed(() => {
                    const algo = algorithms.value[newTest.algorithm];
                    return algo?.params || null;
                });
                
                const canCreateTest = computed(() => {
                    return newTest.name && newTest.symbol && newTest.start_date && newTest.end_date && newTest.algorithm;
                });
                
                const loadTestCases = async () => {
                    try {
                        const params = new URLSearchParams();
                        if (filters.symbol) params.append('symbol', filters.symbol);
                        if (filters.algorithm) params.append('algorithm', filters.algorithm);
                        if (filters.status) params.append('status', filters.status);
                        
                        const res = await axios.get('/api/test-cases?' + params.toString());
                        testCases.value = res.data.data.items;
                    } catch (e) {
                        console.error('加载测试用例失败:', e);
                    }
                };
                
                const loadAlgorithms = async () => {
                    try {
                        const res = await axios.get('/api/algorithms');
                        algorithms.value = res.data.data;
                    } catch (e) {
                        console.error('加载算法列表失败:', e);
                    }
                };
                
                const onTestCaseClick = (tc) => {
                    if (compareMode.value) {
                        const idx = selectedCases.value.indexOf(tc.id);
                        if (idx >= 0) {
                            selectedCases.value.splice(idx, 1);
                        } else if (selectedCases.value.length < 4) {
                            selectedCases.value.push(tc.id);
                        }
                    } else {
                        selectedCase.value = tc;
                        if (tc.status === 'completed') {
                            loadTestCaseData(tc.id);
                        }
                    }
                };
                
                const loadTestCaseData = async (testCaseId) => {
                    try {
                        const res = await axios.get(`/api/test-cases/${testCaseId}`);
                        const data = res.data.data;
                        
                        if (data.result) {
                            statusRanges.value = data.result.status_ranges || [];
                            
                            const statsRes = await axios.get(`/api/statistics/${data.result.id}`);
                            statistics.value = statsRes.data.data;
                            
                            const dailyRes = await axios.get(`/api/daily-statuses/${data.result.id}`);
                            dailyStatuses.value = dailyRes.data.data;
                            
                            await nextTick();
                            renderChart();
                        }
                    } catch (e) {
                        console.error('加载测试数据失败:', e);
                    }
                };
                
                const renderChart = () => {
                    const container = document.getElementById('chart');
                    if (!container || dailyStatuses.value.length === 0) return;
                    
                    if (chart) {
                        chart.dispose();
                    }
                    
                    chart = echarts.init(container);
                    
                    const dates = dailyStatuses.value.map(d => d.date);
                    const ohlc = dailyStatuses.value.map(d => [d.open_price, d.close_price, d.low_price, d.high_price]);
                    const statusColors = dailyStatuses.value.map(d => getStatusColor(d.status));
                    
                    let option;
                    
                    if (renderMode.value === 'top') {
                        option = {
                            animation: false,
                            tooltip: {
                                trigger: 'axis',
                                axisPointer: { type: 'cross' },
                                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                                borderColor: '#ccc',
                                borderWidth: 1,
                                textStyle: { color: '#333' },
                                formatter: function(params) {
                                    if (!params || params.length === 0) return '';
                                    const dataIndex = params[0].dataIndex;
                                    const d = dailyStatuses.value[dataIndex];
                                    if (!d) return '';
                                    const statusText = getStatusText(d.status);
                                    const color = getStatusColor(d.status);
                                    return `<div style="padding: 4px;">
                                        <div style="font-weight: bold; margin-bottom: 4px;">${d.date}</div>
                                        <div style="margin-bottom: 2px;"><span style="color: ${color};">●</span> 状态: ${statusText} (${(d.confidence * 100).toFixed(0)}%)</div>
                                        <div style="margin-bottom: 2px;">振幅: ${d.amplitude}%</div>
                                        <div style="color: #ef4444;">开: ${d.open_price} 高: ${d.high_price}</div>
                                        <div style="color: #22c55e;">收: ${d.close_price} 低: ${d.low_price}</div>
                                    </div>`;
                                }
                            },
                            grid: [
                                { left: '3%', right: '3%', top: 10, height: 20 },
                                { left: '3%', right: '3%', top: 35, bottom: 40 },
                            ],
                            xAxis: [
                                {
                                    type: 'category',
                                    gridIndex: 0,
                                    data: dates,
                                    boundaryGap: true,
                                    axisLine: { show: false },
                                    axisTick: { show: false },
                                    axisLabel: { show: false },
                                    splitLine: { show: false },
                                },
                                {
                                    type: 'category',
                                    gridIndex: 1,
                                    data: dates,
                                    boundaryGap: true,
                                    axisLine: { onZero: false },
                                    splitLine: { show: false },
                                    axisLabel: { show: false },
                                    min: 'dataMin',
                                    max: 'dataMax',
                                },
                            ],
                            yAxis: [
                                {
                                    type: 'value',
                                    gridIndex: 0,
                                    min: 0,
                                    max: 1,
                                    axisLine: { show: false },
                                    axisTick: { show: false },
                                    axisLabel: { show: false },
                                    splitLine: { show: false },
                                },
                                {
                                    type: 'value',
                                    gridIndex: 1,
                                    scale: true,
                                    splitArea: { show: true },
                                },
                            ],
                            dataZoom: [
                                { type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 },
                                { show: true, type: 'slider', xAxisIndex: [0, 1], bottom: 5, start: 0, end: 100, height: 20 },
                            ],
                            series: [
                                {
                                    name: '状态',
                                    type: 'bar',
                                    xAxisIndex: 0,
                                    yAxisIndex: 0,
                                    data: statusColors.map(color => ({
                                        value: 1,
                                        itemStyle: { color: color.replace(')', ', 0.6)') },
                                    })),
                                    barWidth: '100%',
                                    z: 1,
                                },
                                {
                                    name: 'K线',
                                    type: 'candlestick',
                                    xAxisIndex: 1,
                                    yAxisIndex: 1,
                                    data: ohlc,
                                    itemStyle: {
                                        color: '#ef4444',
                                        color0: '#22c55e',
                                        borderColor: '#ef4444',
                                        borderColor0: '#22c55e',
                                    },
                                    z: 2,
                                },
                            ],
                        };
                    } else {
                        const priceMax = Math.max(...dailyStatuses.value.map(d => d.high_price));
                        const priceMin = Math.min(...dailyStatuses.value.map(d => d.low_price));
                        const priceRange = priceMax - priceMin;
                        const barHeight = priceRange * 0.012;
                        const gapRatio = 0.03;
                        
                        const statusGroups = [];
                        let currentGroup = null;
                        dailyStatuses.value.forEach((d, i) => {
                            if (currentGroup === null || currentGroup.status !== d.status) {
                                if (currentGroup !== null) {
                                    statusGroups.push(currentGroup);
                                }
                                currentGroup = {
                                    status: d.status,
                                    startIndex: i,
                                    endIndex: i,
                                    highPrice: d.high_price,
                                };
                            } else {
                                currentGroup.endIndex = i;
                                currentGroup.highPrice = Math.max(currentGroup.highPrice, d.high_price);
                            }
                        });
                        if (currentGroup !== null) {
                            statusGroups.push(currentGroup);
                        }
                        
                        const markAreaData = [];
                        statusGroups.forEach((group) => {
                            const gap = priceRange * gapRatio;
                            const barY = group.highPrice + gap;
                            const color = getStatusColor(group.status);
                            
                            markAreaData.push([
                                {
                                    xAxis: group.startIndex,
                                    yAxis: barY,
                                    name: getStatusText(group.status),
                                    itemStyle: {
                                        color: color.replace(')', ', 0.8)'),
                                    },
                                },
                                {
                                    xAxis: group.endIndex + 1,
                                    yAxis: barY + barHeight,
                                }
                            ]);
                        });
                        
                        option = {
                            animation: false,
                            tooltip: {
                                trigger: 'axis',
                                axisPointer: { type: 'cross' },
                                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                                borderColor: '#ccc',
                                borderWidth: 1,
                                textStyle: { color: '#333' },
                                formatter: function(params) {
                                    if (!params || params.length === 0) return '';
                                    const dataIndex = params[0].dataIndex;
                                    const d = dailyStatuses.value[dataIndex];
                                    if (!d) return '';
                                    const statusText = getStatusText(d.status);
                                    const color = getStatusColor(d.status);
                                    return `<div style="padding: 4px;">
                                        <div style="font-weight: bold; margin-bottom: 4px;">${d.date}</div>
                                        <div style="margin-bottom: 2px;"><span style="color: ${color};">●</span> 状态: ${statusText} (${(d.confidence * 100).toFixed(0)}%)</div>
                                        <div style="margin-bottom: 2px;">振幅: ${d.amplitude}%</div>
                                        <div style="color: #ef4444;">开: ${d.open_price} 高: ${d.high_price}</div>
                                        <div style="color: #22c55e;">收: ${d.close_price} 低: ${d.low_price}</div>
                                    </div>`;
                                }
                            },
                            grid: [
                                { left: '3%', right: '3%', top: 20, bottom: 40 },
                            ],
                            xAxis: {
                                type: 'category',
                                data: dates,
                                boundaryGap: true,
                                axisLine: { onZero: false },
                                splitLine: { show: false },
                                axisLabel: { show: false },
                                min: 'dataMin',
                                max: 'dataMax',
                            },
                            yAxis: {
                                scale: true,
                                splitArea: { show: true },
                            },
                            dataZoom: [
                                { type: 'inside', start: 0, end: 100 },
                                { show: true, type: 'slider', bottom: 5, start: 0, end: 100, height: 20 },
                            ],
                            series: [
                                {
                                    name: 'K线',
                                    type: 'candlestick',
                                    data: ohlc,
                                    itemStyle: {
                                        color: '#ef4444',
                                        color0: '#22c55e',
                                        borderColor: '#ef4444',
                                        borderColor0: '#22c55e',
                                    },
                                    markArea: {
                                        silent: true,
                                        data: markAreaData,
                                    },
                                    z: 2,
                                },
                            ],
                        };
                    }
                    
                    chart.setOption(option);
                    
                    const resizeObserver = new ResizeObserver(() => {
                        chart.resize();
                    });
                    resizeObserver.observe(container);
                    
                    window.addEventListener('resize', () => {
                        chart.resize();
                    });
                };
                
                const getStatusColor = (status) => {
                    const colors = {
                        'ranging': '#f59e0b',
                        'trending_up': '#ef4444',
                        'trending_down': '#22c55e',
                    };
                    return colors[status] || '#666';
                };
                
                const getStatusText = (status) => {
                    const texts = {
                        'pending': '等待中',
                        'running': '执行中',
                        'completed': '已完成',
                        'failed': '失败',
                        'ranging': '震',
                        'trending_up': '涨',
                        'trending_down': '跌',
                    };
                    return texts[status] || status;
                };
                
                const getStatusClass = (status) => {
                    const classes = {
                        'ranging': 'ranging',
                        'trending_up': 'up',
                        'trending_down': 'down',
                    };
                    return classes[status] || '';
                };
                
                const toggleCompareMode = () => {
                    compareMode.value = !compareMode.value;
                    if (!compareMode.value) {
                        selectedCases.value = [];
                        compareResults.value = [];
                        compareViewMode.value = 'separate';
                    }
                };
                
                const cancelCompare = () => {
                    compareMode.value = false;
                    selectedCases.value = [];
                    compareResults.value = [];
                    compareViewMode.value = 'separate';
                };
                
                const startCompare = async () => {
                    if (selectedCases.value.length < 2) return;
                    
                    try {
                        const res = await axios.post('/api/compare', {
                            test_case_ids: selectedCases.value
                        });
                        compareResults.value = res.data.data;
                        
                        await nextTick();
                        renderCompareCharts();
                    } catch (e) {
                        console.error('对比失败:', e);
                    }
                };
                
                const renderCompareCharts = () => {
                    charts.forEach(c => {
                        if (c && c.dispose) c.dispose();
                    });
                    charts = [];
                    
                    if (mergedChart) {
                        mergedChart.dispose();
                        mergedChart = null;
                    }
                    
                    if (compareResults.value.length === 0) return;
                    
                    if (compareViewMode.value === 'separate') {
                        renderSeparateCompare();
                    } else {
                        renderMergedCompare();
                    }
                };
                
                const renderSeparateCompare = () => {
                    const allDates = new Set();
                    compareResults.value.forEach(result => {
                        const dailyStatuses = result.daily_statuses || [];
                        dailyStatuses.forEach(d => allDates.add(d.date));
                    });
                    const sortedDates = Array.from(allDates).sort();
                    
                    compareResults.value.forEach((result, index) => {
                        const container = document.getElementById(`compare-chart-${index}`);
                        if (!container) return;
                        
                        const dailyStatuses = result.daily_statuses || [];
                        if (dailyStatuses.length === 0) return;
                        
                        const chartInstance = echarts.init(container);
                        
                        const dateMap = {};
                        dailyStatuses.forEach(d => {
                            dateMap[d.date] = d;
                        });
                        
                        const validDates = sortedDates.filter(date => dateMap[date]);
                        
                        const ohlc = validDates.map(date => {
                            const d = dateMap[date];
                            return [d.open_price, d.close_price, d.low_price, d.high_price];
                        });
                        
                        const statusColors = validDates.map(date => {
                            const d = dateMap[date];
                            return getStatusColor(d.status);
                        });
                        
                        const option = {
                            animation: false,
                            title: {
                                text: `${result.test_case.symbol} | ${result.test_case.algorithm} | 震${result.statistics?.ranging_days || 0} 涨${result.statistics?.trending_up_days || 0} 跌${result.statistics?.trending_down_days || 0}`,
                                left: 'center',
                                top: 5,
                                textStyle: { fontSize: 12 },
                            },
                            tooltip: {
                                trigger: 'axis',
                                axisPointer: { type: 'cross' },
                            },
                            grid: [
                                { left: '3%', right: '3%', top: 30, height: 25 },
                                { left: '3%', right: '3%', top: 60, bottom: 30 },
                            ],
                            xAxis: [
                                {
                                    type: 'category',
                                    gridIndex: 0,
                                    data: validDates,
                                    axisLine: { show: false },
                                    axisTick: { show: false },
                                    axisLabel: { show: false },
                                },
                                {
                                    type: 'category',
                                    gridIndex: 1,
                                    data: validDates,
                                    axisLine: { onZero: false },
                                    axisLabel: { show: false },
                                    min: 'dataMin',
                                    max: 'dataMax',
                                },
                            ],
                            yAxis: [
                                {
                                    type: 'value',
                                    gridIndex: 0,
                                    min: 0,
                                    max: 1,
                                    axisLine: { show: false },
                                    axisTick: { show: false },
                                    axisLabel: { show: false },
                                    splitLine: { show: false },
                                },
                                {
                                    type: 'value',
                                    gridIndex: 1,
                                    scale: true,
                                    splitLine: { show: true, lineStyle: { color: '#eee' } },
                                },
                            ],
                            dataZoom: [
                                { type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 },
                            ],
                            series: [
                                {
                                    name: '状态',
                                    type: 'bar',
                                    xAxisIndex: 0,
                                    yAxisIndex: 0,
                                    data: statusColors.map(color => ({
                                        value: 1,
                                        itemStyle: { color: color.replace(')', ', 0.6)') },
                                    })),
                                    barWidth: '100%',
                                },
                                {
                                    name: 'K线',
                                    type: 'candlestick',
                                    xAxisIndex: 1,
                                    yAxisIndex: 1,
                                    data: ohlc,
                                    itemStyle: {
                                        color: '#ef4444',
                                        color0: '#22c55e',
                                        borderColor: '#ef4444',
                                        borderColor0: '#22c55e',
                                    },
                                },
                            ],
                        };
                        
                        chartInstance.setOption(option);
                        charts.push(chartInstance);
                    });
                    
                    if (charts.length > 1) {
                        echarts.connect(charts);
                    }
                };
                
                const renderMergedCompare = () => {
                    const container = document.getElementById('merged-chart');
                    if (!container) return;
                    
                    mergedChart = echarts.init(container);
                    
                    const allDates = new Set();
                    compareResults.value.forEach(result => {
                        const dailyStatuses = result.daily_statuses || [];
                        dailyStatuses.forEach(d => allDates.add(d.date));
                    });
                    const sortedDates = Array.from(allDates).sort();
                    
                    const datasets = compareResults.value.map((result, idx) => {
                        const dailyStatuses = result.daily_statuses || [];
                        const dateMap = {};
                        dailyStatuses.forEach(d => {
                            dateMap[d.date] = d;
                        });
                        
                        const validDates = sortedDates.filter(date => dateMap[date]);
                        
                        const ohlc = validDates.map(date => {
                            const d = dateMap[date];
                            return [d.open_price, d.close_price, d.low_price, d.high_price];
                        });
                        
                        const statusGroups = [];
                        let currentGroup = null;
                        validDates.forEach((date, i) => {
                            const d = dateMap[date];
                            if (currentGroup === null || currentGroup.status !== d.status) {
                                if (currentGroup !== null) {
                                    statusGroups.push(currentGroup);
                                }
                                currentGroup = {
                                    status: d.status,
                                    startIndex: i,
                                    endIndex: i,
                                    highPrice: d.high_price,
                                };
                            } else {
                                currentGroup.endIndex = i;
                                currentGroup.highPrice = Math.max(currentGroup.highPrice, d.high_price);
                            }
                        });
                        if (currentGroup !== null) {
                            statusGroups.push(currentGroup);
                        }
                        
                        return {
                            name: `${result.test_case.algorithm}`,
                            ohlc: ohlc,
                            validDates: validDates,
                            statusGroups: statusGroups,
                        };
                    });
                    
                    const priceMax = Math.max(...compareResults.value.flatMap(r => 
                        (r.daily_statuses || []).map(d => d.high_price)
                    ));
                    const priceMin = Math.min(...compareResults.value.flatMap(r => 
                        (r.daily_statuses || []).map(d => d.low_price)
                    ));
                    const priceRange = priceMax - priceMin;
                    const barHeight = priceRange * 0.008;
                    const gapRatio = 0.02;
                    
                    const colors = ['#ef4444', '#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6'];
                    
                    const series = [];
                    const markAreas = [];
                    
                    datasets.forEach((ds, dsIdx) => {
                        const baseGap = priceRange * gapRatio * dsIdx * 3;
                        
                        const dsMarkAreas = ds.statusGroups.map(group => {
                            const gap = priceRange * gapRatio;
                            const barY = group.highPrice + baseGap + gap;
                            const color = getStatusColor(group.status);
                            
                            return [
                                {
                                    xAxis: ds.validDates[group.startIndex],
                                    yAxis: barY,
                                    name: getStatusText(group.status),
                                    itemStyle: {
                                        color: color.replace(')', ', 0.6)'),
                                    },
                                },
                                {
                                    xAxis: ds.validDates[group.endIndex],
                                    yAxis: barY + barHeight,
                                }
                            ];
                        });
                        
                        markAreas.push(...dsMarkAreas);
                        
                        series.push({
                            name: ds.name,
                            type: 'candlestick',
                            data: ds.ohlc,
                            itemStyle: {
                                color: '#ef4444',
                                color0: '#22c55e',
                                borderColor: '#ef4444',
                                borderColor0: '#22c55e',
                            },
                            z: dsIdx + 1,
                        });
                    });
                    
                    const option = {
                        animation: false,
                        title: {
                            text: `${compareResults.value[0].test_case.symbol} | 多算法对比 (${sortedDates[0]} ~ ${sortedDates[sortedDates.length - 1]})`,
                            left: 'center',
                            top: 10,
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: { type: 'cross' },
                        },
                        legend: {
                            data: datasets.map(ds => ds.name),
                            top: 40,
                        },
                        grid: [
                            { left: '5%', right: '5%', top: 70, bottom: 50 },
                        ],
                        xAxis: {
                            type: 'category',
                            data: sortedDates,
                            boundaryGap: true,
                            axisLine: { onZero: false },
                            splitLine: { show: false },
                            axisLabel: { show: false },
                            min: 'dataMin',
                            max: 'dataMax',
                        },
                        yAxis: {
                            scale: true,
                            splitArea: { show: true },
                        },
                        dataZoom: [
                            { type: 'inside', start: 0, end: 100 },
                            { show: true, type: 'slider', bottom: 10, start: 0, end: 100, height: 20 },
                        ],
                        series: series,
                    };
                    
                    mergedChart.setOption(option);
                    
                    const resizeObserver = new ResizeObserver(() => {
                        mergedChart.resize();
                    });
                    resizeObserver.observe(container);
                };
                
                const createTest = async () => {
                    if (!canCreateTest.value) return;
                    
                    try {
                        await axios.post('/api/test-cases', newTest);
                        showNewTestModal.value = false;
                        loadTestCases();
                        
                        newTest.name = '';
                        newTest.description = '';
                        newTest.generate_md = false;
                        newTest.generate_png = false;
                        newTest.generate_html = false;
                    } catch (e) {
                        console.error('创建测试失败:', e);
                        alert('创建测试失败: ' + (e.response?.data?.error || e.message));
                    }
                };
                
                const onAlgorithmChange = () => {
                    const params = currentAlgorithmParams.value;
                    if (params) {
                        Object.keys(params).forEach(key => {
                            if (newTest.algorithm_config[key] === undefined) {
                                newTest.algorithm_config[key] = params[key].default;
                            }
                        });
                    }
                };
                
                const deleteSelected = async () => {
                    if (!selectedCase.value) return;
                    if (!confirm('确定要删除这个测试用例吗？')) return;
                    
                    try {
                        await axios.delete(`/api/test-cases/${selectedCase.value.id}`);
                        selectedCase.value = null;
                        loadTestCases();
                    } catch (e) {
                        console.error('删除失败:', e);
                    }
                };
                
                const reRunTest = async () => {
                    if (!selectedCase.value) return;
                    
                    try {
                        await axios.post(`/api/test-cases/${selectedCase.value.id}/re-run`);
                        loadTestCases();
                    } catch (e) {
                        console.error('重跑失败:', e);
                    }
                };
                
                onMounted(() => {
                    loadAlgorithms();
                    loadTestCases();
                    
                    const today = new Date();
                    const threeMonthsAgo = new Date(today.getFullYear(), today.getMonth() - 3, 1);
                    newTest.end_date = today.toISOString().split('T')[0];
                    newTest.start_date = threeMonthsAgo.toISOString().split('T')[0];
                });
                
                watch(selectedCase, (val) => {
                    if (val && val.status === 'running') {
                        const checkStatus = setInterval(async () => {
                            const res = await axios.get(`/api/test-cases/${val.id}`);
                            if (res.data.data.status !== 'running') {
                                clearInterval(checkStatus);
                                loadTestCases();
                                selectedCase.value = res.data.data;
                                if (res.data.data.status === 'completed') {
                                    loadTestCaseData(val.id);
                                }
                            }
                        }, 2000);
                    }
                });
                
                watch(renderMode, () => {
                    if (dailyStatuses.value.length > 0) {
                        renderChart();
                    }
                });
                
                watch(compareViewMode, async () => {
                    if (compareResults.value.length > 0) {
                        await nextTick();
                        renderCompareCharts();
                    }
                });
                
                return {
                    testCases,
                    selectedCase,
                    selectedCases,
                    compareMode,
                    compareViewMode,
                    compareResults,
                    showNewTestModal,
                    showTable,
                    symbols,
                    algorithms,
                    filters,
                    statistics,
                    statusRanges,
                    dailyStatuses,
                    renderMode,
                    newTest,
                    currentAlgorithmParams,
                    canCreateTest,
                    loadTestCases,
                    onTestCaseClick,
                    toggleCompareMode,
                    cancelCompare,
                    startCompare,
                    createTest,
                    onAlgorithmChange,
                    deleteSelected,
                    reRunTest,
                    getStatusText,
                    getStatusClass,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
